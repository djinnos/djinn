# Default values for the djinn chart.
#
# One-org-per-deployment. No multi-tenant knobs — all resources land in a
# single namespace and the controller reconciles only that namespace.

# -----------------------------------------------------------------------------
# Images
# -----------------------------------------------------------------------------
image:
  # djinn-server controller image (the long-lived Deployment).
  # Override per-release; `:latest` is only a safe default for demos. Use a
  # pinned tag (e.g. `ghcr.io/djinnos/djinn-server:0.1.0`) for production.
  server: djinn-server:latest
  # djinn-agent-runtime image used by task-run Jobs the controller dispatches.
  # Not referenced by any template in this chart directly — the controller
  # reads it from env and plugs it into the Job PodSpec at dispatch time.
  runtime: djinn-agent-runtime:latest
  pullPolicy: IfNotPresent
  # pullSecrets: []

# -----------------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------------
namespace:
  # When true the chart renders a Namespace object. Turn off if you manage the
  # namespace externally (GitOps, Terraform, `kubectl create ns`).
  create: true
  # Namespace the chart's resources land in. Defaults to the Release namespace
  # when empty.
  name: djinn

# -----------------------------------------------------------------------------
# ServiceAccounts
# -----------------------------------------------------------------------------
serviceAccount:
  # SA the djinn-server controller Deployment runs under. Has namespaced RBAC
  # to create + delete Jobs/Pods/Secrets (for task-run dispatch) plus a
  # cluster-scoped binding for TokenReview (for validating worker tokens).
  controller: djinn-controller
  # SA mounted into task-run Job Pods. Has no RBAC — the projected token
  # (audience `djinn`) is presented to djinn-server, which resolves identity
  # via the cluster TokenReview API.
  taskrun: djinn-taskrun

# -----------------------------------------------------------------------------
# Service (for djinn-server)
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  # Worker RPC port — task-run pods dial this to establish the bincode-over-TCP
  # reverse-RPC channel back to djinn-server.
  rpcPort: 8443
  # HTTP API / UI port.
  apiPort: 3000

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  server:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  # Defaults the controller will apply to Job PodSpecs when dispatching
  # task-run workloads. Surfaced here so operators can tune without editing
  # controller env directly. djinn-server reads these via env.
  taskrun:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# -----------------------------------------------------------------------------
# Storage
# -----------------------------------------------------------------------------
# RWX is required for the mirrors PVC on multi-node clusters — the controller
# writes mirror clones and task-run Job Pods read from them. The cache PVC is
# similarly RWX so cargo/pnpm/pip caches survive across task runs.
storage:
  mirrors:
    size: 50Gi
    storageClassName: ""   # "" → use cluster default. Must satisfy RWX.
    accessMode: ReadWriteMany
    # Set to reuse a pre-existing PVC instead of rendering one from this chart.
    existingClaim: ""
    # Set to mount a hostPath from the node instead of a PVC. Only safe on
    # single-node clusters (kind). When non-empty, pvc-mirror.yaml is skipped.
    hostPath: ""
  cache:
    size: 20Gi
    storageClassName: ""
    accessMode: ReadWriteMany
    existingClaim: ""
    hostPath: ""
  # Reference working clones populated by `project_add_from_github`. Mounted
  # at /var/lib/djinn/projects and referenced by project.path in Dolt, so it
  # must survive pod restarts. Only the server Pod reads/writes it —
  # RWO is fine on single-node and cheaper than RWX on shared storage.
  projects:
    size: 20Gi
    storageClassName: ""
    accessMode: ReadWriteOnce
    existingClaim: ""
    hostPath: ""

# -----------------------------------------------------------------------------
# Secrets
# -----------------------------------------------------------------------------
secrets:
  githubApp:
    # If non-empty, the Deployment mounts the named Secret instead of a
    # chart-rendered one. The Secret must expose the same keys listed below.
    existingSecret: ""
    # Literal values — rendered into a chart-managed Secret when
    # existingSecret is empty. Leave blank in VCS; set via `--set` or
    # a local -f overrides file.
    appId: ""
    privateKey: ""
    clientId: ""
    clientSecret: ""
  vaultKey:
    existingSecret: ""
    # Base64-encoded 32-byte AES key used by djinn-db's credential vault.
    # When empty, the chart self-provisions: on first install it generates a
    # fresh 32-byte key via Sprig `randBytes`, and on subsequent `helm upgrade`
    # runs it looks up and preserves the existing Secret's value so data
    # already encrypted under that key stays decryptable. Set this to pin a
    # specific key (e.g. to share across environments or restore from backup).
    key: ""
  # Provider API keys bootstrapped into the encrypted credential vault at
  # server startup. Each non-empty value lands as an env var on the djinn-
  # server pod (keyed by the builtin provider's `required_env_vars`). The
  # server's `bootstrap_env_credentials` pass upserts them into the vault
  # so dispatch-time lookups resolve without any UI interaction.
  #
  # Leave everything blank to rely on ChatGPT / Codex sign-in through the
  # SPA (device-code flow) — that path doesn't use any of these fields.
  providers:
    # If set, mount this pre-existing Secret instead of chart-rendering one.
    # The Secret must expose the same keys listed below (ANTHROPIC_API_KEY,
    # OPENAI_API_KEY, …).
    existingSecret: ""
    anthropicApiKey: ""
    openaiApiKey: ""
    googleApiKey: ""
    azureOpenaiApiKey: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
    gcpVertexProjectId: ""

# -----------------------------------------------------------------------------
# Langfuse (LLM observability) — OTLP export from djinn-server
# -----------------------------------------------------------------------------
# djinn-server initialises OpenTelemetry only when both public + secret keys
# are set. Leave blank to disable. The chart renders a Secret with
# DJINN_LANGFUSE_{PUBLIC,SECRET}_KEY and injects it via envFrom.
langfuse:
  enabled: false
  # OTLP endpoint. For self-hosted Langfuse this is
  # http://<langfuse-web-svc>:3000/api/public/otel.
  endpoint: ""
  # Langfuse project keys (pk-lf-... / sk-lf-...). When existingSecret is
  # non-empty, the chart mounts that instead of rendering one; the Secret
  # must carry DJINN_LANGFUSE_PUBLIC_KEY + DJINN_LANGFUSE_SECRET_KEY.
  publicKey: ""
  secretKey: ""
  existingSecret: ""

# -----------------------------------------------------------------------------
# Ingress (opt-in)
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  host: ""
  # Extra annotations (e.g. cert-manager issuer).
  annotations: {}
  tls:
    enabled: false
    secretName: ""

# -----------------------------------------------------------------------------
# Dolt (bundled SQL state)
# -----------------------------------------------------------------------------
dolt:
  enabled: true
  image: dolthub/dolt-sql-server:latest
  # Service name + port exposed inside the cluster. Consumed by djinn-server
  # via the DJINN_MYSQL_URL env computed in configmap.yaml.
  service:
    port: 3306
  storage:
    size: 20Gi
    storageClassName: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "8Gi"

# -----------------------------------------------------------------------------
# Qdrant (bundled vector store)
# -----------------------------------------------------------------------------
qdrant:
  enabled: true
  image: qdrant/qdrant:latest
  service:
    httpPort: 6333
    grpcPort: 6334
  storage:
    size: 10Gi
    storageClassName: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# -----------------------------------------------------------------------------
# Server env
# -----------------------------------------------------------------------------
env:
  rustLog: "info,djinn=debug"
  # Public base URL (used for GitHub App callback + browser redirects). When
  # empty the Deployment omits the env var and djinn-server falls back to its
  # own default (`http://127.0.0.1:3000`, appropriate only for local dev).
  publicUrl: ""
  webUrl: ""

# Arbitrary extra env injected into the server container. Useful for ad-hoc
# tuning knobs without re-templating.
extraEnv: []
# - name: FOO
#   value: bar

# Node placement (applied to djinn-server Deployment).
nodeSelector: {}
tolerations: []
affinity: {}

# Labels merged onto every chart-managed resource.
labels: {}

# -----------------------------------------------------------------------------
# Image pipeline (Phase 3): BuildKit daemon + Zot registry + image controller
# -----------------------------------------------------------------------------
# Per-project devcontainer images are built by a reconciling image-controller
# that drives `devcontainer build` in a Job against a shared rootless BuildKit
# daemon and pushes the result to an in-cluster Zot registry. Kubernetes Jobs
# for task runs pull from Zot at dispatch time.
#
# Node prerequisites for rootless BuildKit (see README.md):
#   sysctl kernel.unprivileged_userns_clone=1
#   sysctl user.max_user_namespaces=28633   # or higher
imagePipeline:
  enabled: true
  # Fully-qualified cluster-local hostname workers + controller use to pull
  # per-project images. Must resolve to the Zot Service.
  registryHost: "zot.djinn.svc.cluster.local:5000"
  # Pinned reference to the djinn-agent-worker devcontainer Feature. Consumed
  # by generated `.devcontainer/devcontainer.json` starter files (PR 6) and
  # by PR 5's build Job env.
  featureRef: "ghcr.io/djinnos/djinn-agent-worker:1"
  buildkitd:
    image: moby/buildkit:v0.15.2-rootless
    # gRPC port exposed on the buildkitd Service. Consumed by the build Job
    # via DOCKER_HOST=tcp://<svc>:<port>.
    port: 1234
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.0
    # HTTP port exposed on the Zot Service. v1 OCI distribution spec.
    port: 5000
    storage:
      size: 100Gi
      storageClassName: ""   # "" → cluster default
      accessMode: ReadWriteOnce
      existingClaim: ""
    auth:
      # When non-empty, the chart mounts this pre-existing Secret instead of
      # rendering one from the inline values. Secret must carry both
      # `htpasswd` (bcrypt'd user:pass) and `config.json` (docker auth config).
      existingSecret: ""
      # Default credentials used by buildkitd + image-controller to push/pull.
      # Overridden via --set or a secrets-only values file at install time.
      username: "djinn"
      password: "djinn"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
  controller:
    # PR 5 replaces this with the real image-controller binary. Until then the
    # Deployment renders as a busybox sleep stub so the rest of the chart can
    # be installed + iterated on.
    image: "busybox:1.36"
    maxConcurrentBuilds: 3
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  # Builder image (Node + docker CLI + buildx + @devcontainers/cli) baked by
  # server/docker/djinn-image-builder.Dockerfile. Pinned here for PR 5 build
  # Jobs; no template in this chart references it directly — the controller
  # reads it from env and plugs it into the Job PodSpec at dispatch time.
  builderImage: "ghcr.io/djinnos/djinn-image-builder:latest"

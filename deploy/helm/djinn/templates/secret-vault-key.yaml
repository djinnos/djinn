{{- if not .Values.secrets.vaultKey.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "djinn.secretName.vaultKey" . }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
type: Opaque
data:
  # Key material — already base64 in values.yaml so we pass it through
  # verbatim. When empty the Secret still renders so the Deployment's volume
  # mount stays valid; djinn-server refuses to start without a real key.
  vault.key: {{ .Values.secrets.vaultKey.key | default "" | quote }}
{{- end -}}

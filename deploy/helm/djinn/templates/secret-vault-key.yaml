{{- if not .Values.secrets.vaultKey.existingSecret -}}
{{- /*
Self-provisioning vault key.

Priority (highest wins):
  1. Operator-supplied `.Values.secrets.vaultKey.key` — already base64-encoded
     32 bytes per values.yaml convention; passed through verbatim.
  2. Previously-generated value read back from the live Secret via `lookup`
     so `helm upgrade` preserves the key and any data already encrypted with
     it stays decryptable.
  3. Freshly generated on first install: `randBytes 32` returns a base64
     string wrapping 32 raw random bytes, exactly the format the Secret's
     `data` field expects and exactly what djinn-db's crypto module reads
     off disk (it requires a 32-byte key file — see crypto.rs::KEY_LEN).

`randAlphaNum 32` was NOT chosen: although it also yields 32 bytes, it
restricts the key space to [A-Za-z0-9] (~190 bits), short of the full
AES-256 key space. `randBytes 32` gives the full 256 bits of entropy.
*/ -}}
{{- $secretName := printf "%s-vault-key" (include "djinn.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" (include "djinn.namespace" .) $secretName -}}
{{- $key := "" -}}
{{- if .Values.secrets.vaultKey.key -}}
{{-   $key = .Values.secrets.vaultKey.key -}}
{{- else if and $existing (hasKey (default (dict) $existing.data) "vault.key") -}}
{{-   $key = index $existing.data "vault.key" -}}
{{- else -}}
{{-   $key = randBytes 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "djinn.secretName.vaultKey" . }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64-encoded 32-byte AES-256 key. All three source paths (operator,
  # live-Secret lookup, fresh randBytes) already yield a base64 string, so
  # we emit it verbatim — do NOT pipe through b64enc here.
  vault.key: {{ $key | quote }}
{{- end -}}

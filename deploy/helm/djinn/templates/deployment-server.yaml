apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "djinn.fullname" . }}-server
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    # Leader election is not wired up; stick to Recreate so we never have two
    # controllers racing to dispatch Jobs or write to Dolt.
    type: Recreate
  selector:
    matchLabels:
      {{- include "djinn.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Rotate Pod when any of its mounted config changes — kagent pattern.
        # `sha256sum` of the rendered template text is enough for detection.
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret-github-app: {{ include (print $.Template.BasePath "/secret-github-app.yaml") . | sha256sum }}
        checksum/secret-vault-key: {{ include (print $.Template.BasePath "/secret-vault-key.yaml") . | sha256sum }}
      labels:
        {{- include "djinn.server.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "djinn.serviceAccountName.controller" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # hostPath / PVC volumes land owned by root:root, but djinn-server runs
      # as uid 10001. fsGroup only helps for CSI-backed PVCs, not hostPath, so
      # we chown the three writable mounts up-front in a root initContainer.
      # Idempotent — re-runs every pod start with negligible cost.
      initContainers:
        - name: fix-volume-perms
          image: {{ .Values.image.server | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              for d in /var/lib/djinn/mirrors /var/lib/djinn/cache /var/lib/djinn/projects; do
                mkdir -p "$d"
                chown 10001:10001 "$d"
                chmod 0775 "$d"
              done
          volumeMounts:
            - name: mirrors
              mountPath: /var/lib/djinn/mirrors
            - name: cache
              mountPath: /var/lib/djinn/cache
            - name: projects
              mountPath: /var/lib/djinn/projects
      containers:
        - name: djinn-server
          image: {{ .Values.image.server | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: rpc
              containerPort: {{ .Values.service.rpcPort }}
              protocol: TCP
            - name: api
              containerPort: {{ .Values.service.apiPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "djinn.fullname" . }}-server
          env:
            # HTTP bind port — must match `service.apiPort`. The binary's
            # CLI default is 8372 (legacy local-dev), so we have to pin it
            # here or the readiness probe would never pass.
            - name: DJINN_PORT
              value: {{ .Values.service.apiPort | quote }}
            # Pin the worker reverse-RPC bind addr explicitly; the code
            # defaults to 0.0.0.0:8443 already but surfacing it here makes
            # the chart self-documenting.
            - name: DJINN_RPC_ADDR
              value: {{ printf "0.0.0.0:%d" (.Values.service.rpcPort | int) | quote }}
            # Force the k8s runtime path even though it's the default — we
            # never want a chart-managed Deployment accidentally running as
            # the in-process TestRuntime.
            - name: DJINN_RUNTIME
              value: "kubernetes"
            - name: DJINN_VAULT_KEY_PATH
              value: /var/run/secrets/djinn/vault.key
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /var/run/secrets/djinn/github-app/private-key.pem
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.githubApp" . }}
                  key: app-id
                  optional: true
            - name: GITHUB_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.githubApp" . }}
                  key: client-id
                  optional: true
            - name: GITHUB_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.githubApp" . }}
                  key: client-secret
                  optional: true
            # Provider API keys — read by djinn-provider::bootstrap at startup.
            # Every entry is optional: the Secret is rendered with empty
            # strings for unset keys, and `optional: true` means the pod
            # happily starts even if the Secret doesn't exist at all (e.g. an
            # operator who only uses Codex OAuth through the UI).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: OPENAI_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: GOOGLE_API_KEY
                  optional: true
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: AZURE_OPENAI_API_KEY
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: GCP_VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "djinn.secretName.providers" . }}
                  key: GCP_VERTEX_PROJECT_ID
                  optional: true
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: mirrors
              mountPath: /var/lib/djinn/mirrors
            - name: cache
              mountPath: /var/lib/djinn/cache
            - name: projects
              mountPath: /var/lib/djinn/projects
            - name: vault-key
              mountPath: /var/run/secrets/djinn/vault.key
              subPath: vault.key
              readOnly: true
            - name: github-app
              mountPath: /var/run/secrets/djinn/github-app
              readOnly: true
          resources:
            {{- toYaml .Values.resources.server | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: api
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: api
            periodSeconds: 30
            initialDelaySeconds: 30
      volumes:
        - name: mirrors
          {{- if .Values.storage.mirrors.hostPath }}
          hostPath:
            path: {{ .Values.storage.mirrors.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "djinn.pvcName.mirrors" . }}
          {{- end }}
        - name: cache
          {{- if .Values.storage.cache.hostPath }}
          hostPath:
            path: {{ .Values.storage.cache.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "djinn.pvcName.cache" . }}
          {{- end }}
        - name: projects
          {{- if .Values.storage.projects.hostPath }}
          hostPath:
            path: {{ .Values.storage.projects.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "djinn.pvcName.projects" . }}
          {{- end }}
        - name: vault-key
          secret:
            secretName: {{ include "djinn.secretName.vaultKey" . }}
            items:
              - key: vault.key
                path: vault.key
            # 0444 (world-readable) so the non-root djinn user (uid 10001)
            # can read the file. The Secret is namespace-scoped + only
            # mounted into this Pod, so "world-readable" inside the
            # container is fine.
            defaultMode: 0444
        - name: github-app
          secret:
            secretName: {{ include "djinn.secretName.githubApp" . }}
            optional: true
            # 0444 (world-readable) so the non-root djinn user (uid 10001)
            # can read the file. The Secret is namespace-scoped + only
            # mounted into this Pod, so "world-readable" inside the
            # container is fine.
            defaultMode: 0444

{{- if .Values.imagePipeline.enabled -}}
# Image controller — reconciles `projects.stack.manifest_signals.has_*` +
# devcontainer.json hash into per-project images pushed to Zot.
#
# PR 4 ships the infrastructure (SA, RBAC, Deployment shape) with a busybox
# `sleep infinity` stub. PR 5 swaps the image + command for the real
# djinn-image-controller binary; the env, labels, selector, and SA stay as
# declared here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "djinn.fullname" . }}-image-controller
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-controller
spec:
  replicas: 1
  strategy:
    # Single reconciler, no leader election wired up yet. Two replicas would
    # race to create the same build Job name. PR 5 can revisit once the
    # controller owns a lease.
    type: Recreate
  selector:
    matchLabels:
      {{- include "djinn.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: image-controller
  template:
    metadata:
      labels:
        {{- include "djinn.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: image-controller
    spec:
      serviceAccountName: {{ printf "%s-image-controller" (include "djinn.fullname" .) }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: image-controller
          image: {{ .Values.imagePipeline.controller.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # PR 4 stub. PR 5 replaces command with the real binary entrypoint.
          command: ["sleep", "infinity"]
          env:
            # Consumed by the real controller in PR 5 — declared here so the
            # Deployment diff between PRs is just `image` + `command`.
            - name: DJINN_BUILDKITD_ADDR
              value: {{ printf "tcp://%s-buildkitd.%s.svc.cluster.local:%d" (include "djinn.fullname" .) (include "djinn.namespace" .) (.Values.imagePipeline.buildkitd.port | int) | quote }}
            - name: DJINN_REGISTRY_HOST
              value: {{ .Values.imagePipeline.registryHost | quote }}
            - name: DJINN_BUILDER_IMAGE
              value: {{ .Values.imagePipeline.builderImage | quote }}
            - name: DJINN_MAX_CONCURRENT_BUILDS
              value: {{ .Values.imagePipeline.controller.maxConcurrentBuilds | quote }}
            - name: DJINN_REGISTRY_AUTH_SECRET
              {{- if .Values.imagePipeline.zot.auth.existingSecret }}
              value: {{ .Values.imagePipeline.zot.auth.existingSecret | quote }}
              {{- else }}
              value: {{ printf "%s-zot-auth" (include "djinn.fullname" .) | quote }}
              {{- end }}
          resources:
            {{- toYaml .Values.imagePipeline.controller.resources | nindent 12 }}
{{- end -}}

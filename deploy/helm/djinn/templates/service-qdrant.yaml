{{- if .Values.qdrant.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "djinn.serviceName.qdrant" . }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.qdrant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "djinn.qdrant.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.qdrant.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
{{- end -}}

{{- if .Values.imagePipeline.enabled -}}
# RBAC for the image controller (PR 5). The controller creates per-project
# build Jobs, reads their Pod status + logs, mounts the registry-auth
# Secret into those Jobs, and occasionally refreshes ConfigMaps holding
# generated devcontainer starter specs. Scope is strictly namespaced.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ printf "%s-image-controller" (include "djinn.fullname" .) }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-image-controller" (include "djinn.fullname" .) }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-controller
rules:
  # Build Jobs: create + watch + delete per reconcile tick. backoffLimit=1
  # and ttlSecondsAfterFinished keep the object count bounded.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "patch", "delete"]
  # Pod status + logs: surface build failures back to the UI banner.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Secrets: reference the registry-auth Secret in the Job volume spec.
  # No list/watch needed — the controller knows the name from env.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # ConfigMaps: optional — future PRs may cache the generated starter
  # devcontainer.json per project in a ConfigMap. Granted up-front so
  # we don't re-ship RBAC in PR 6.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # Events: scheduler / image-pull failures feed the UI banner.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-image-controller" (include "djinn.fullname" .) }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-controller
subjects:
  - kind: ServiceAccount
    name: {{ printf "%s-image-controller" (include "djinn.fullname" .) }}
    namespace: {{ include "djinn.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-image-controller" (include "djinn.fullname" .) }}
{{- end -}}

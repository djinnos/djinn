{{- if and .Values.imagePipeline.enabled (not .Values.imagePipeline.zot.auth.existingSecret) -}}
# Registry auth for Zot. Carries two artifacts:
#   * htpasswd   — bcrypt'd user:pass for Zot's HTTP basic-auth (path refs
#                  /secret/htpasswd inside the pod, see zot-configmap.yaml).
#   * config.json — docker CLI auth file mounted into buildkitd + the future
#                  image-controller build Job at ~/.docker/config.json.
#
# Both derive from the same username/password pair in values.yaml. Using
# an existingSecret bypasses this template entirely; the operator is then
# responsible for both keys being present.
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-zot-auth" (include "djinn.fullname" .) }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.labels" . | nindent 4 }}
    app.kubernetes.io/component: zot
type: Opaque
{{- $user := .Values.imagePipeline.zot.auth.username | default "djinn" }}
{{- $pass := .Values.imagePipeline.zot.auth.password | default "djinn" }}
{{- $registry := .Values.imagePipeline.registryHost }}
{{- $b64cred := printf "%s:%s" $user $pass | b64enc }}
{{- $cfg := dict "auths" (dict $registry (dict "auth" $b64cred)) }}
stringData:
  # htpasswd line for Zot: bcrypt-hashed with Sprig's htpasswd helper.
  htpasswd: {{ htpasswd $user $pass | quote }}
  # Docker CLI config consumed by `docker login`-free builds. The registry
  # host key must match the push target used by buildkitd / the build Job.
  config.json: {{ toJson $cfg | quote }}
{{- end -}}

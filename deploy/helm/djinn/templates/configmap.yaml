apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "djinn.fullname" . }}-server
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
data:
  # Non-secret env consumed by djinn-server. Paths mirror the Deployment's
  # volume mounts: /var/lib/djinn is the shared workspace root (mirrors +
  # caches), /var/run/secrets/djinn holds the mounted AES + GitHub App keys.
  DJINN_HOME: "/var/lib/djinn"
  RUST_LOG: {{ .Values.env.rustLog | quote }}
  DJINN_DB_BACKEND: "dolt"
  DJINN_MYSQL_FLAVOR: "dolt"
  DJINN_VECTOR_BACKEND: "qdrant"
  {{- if .Values.dolt.enabled }}
  DJINN_MYSQL_URL: {{ printf "mysql://root@%s.%s.svc.cluster.local:%d/djinn" (include "djinn.serviceName.dolt" .) (include "djinn.namespace" .) (.Values.dolt.service.port | int) | quote }}
  {{- end }}
  {{- if .Values.qdrant.enabled }}
  QDRANT_URL: {{ printf "http://%s.%s.svc.cluster.local:%d" (include "djinn.serviceName.qdrant" .) (include "djinn.namespace" .) (.Values.qdrant.service.grpcPort | int) | quote }}
  {{- end }}
  # Image the controller stamps into task-run Job PodSpecs.
  DJINN_TASKRUN_IMAGE: {{ .Values.image.runtime | quote }}
  DJINN_TASKRUN_IMAGE_PULL_POLICY: {{ .Values.image.pullPolicy | quote }}
  DJINN_TASKRUN_NAMESPACE: {{ include "djinn.namespace" . | quote }}
  DJINN_TASKRUN_SERVICE_ACCOUNT: {{ include "djinn.serviceAccountName.taskrun" . | quote }}
  DJINN_SERVER_RPC_ADDR: {{ printf "%s.%s.svc.cluster.local:%d" (include "djinn.serviceName.server" .) (include "djinn.namespace" .) (.Values.service.rpcPort | int) | quote }}
  # OAuth callbacks + browser redirects mint URLs against DJINN_PUBLIC_URL.
  # Precedence: explicit env.publicUrl override → Ingress host (when the
  # Ingress is enabled) → in-cluster Service DNS. We always render a value
  # so the binary never falls back to its 127.0.0.1 CLI default in-cluster.
  {{- if .Values.env.publicUrl }}
  DJINN_PUBLIC_URL: {{ .Values.env.publicUrl | quote }}
  {{- else if and .Values.ingress.enabled .Values.ingress.host }}
  DJINN_PUBLIC_URL: {{ printf "%s://%s" (ternary "https" "http" .Values.ingress.tls.enabled) .Values.ingress.host | quote }}
  {{- else }}
  DJINN_PUBLIC_URL: {{ printf "http://%s.%s.svc.cluster.local:%d" (include "djinn.serviceName.server" .) (include "djinn.namespace" .) (.Values.service.apiPort | int) | quote }}
  {{- end }}
  {{- with .Values.env.webUrl }}
  DJINN_WEB_URL: {{ . | quote }}
  {{- end }}

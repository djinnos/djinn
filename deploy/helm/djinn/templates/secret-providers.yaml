{{- /*
  Provider API keys — mounted into djinn-server as env vars whose names
  match the `required_env_vars` declared on each BuiltinProvider in
  `server/crates/djinn-provider/src/catalog/builtin.rs`. At startup the
  server reads these vars and upserts them into the encrypted credential
  vault (see `djinn-provider::bootstrap::bootstrap_env_credentials`).

  Skip rendering entirely when the operator points us at a pre-existing
  Secret via `secrets.providers.existingSecret` — the Deployment consumes
  whichever Secret wins.

  All values are optional: leaving them empty simply means that provider
  is not bootstrapped and the corresponding env var is left unset on the
  pod. ChatGPT / Codex is *not* listed here — it authenticates through the
  device-code UI flow and its tokens live in the vault directly.
*/ -}}
{{- if not .Values.secrets.providers.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "djinn.secretName.providers" . }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.providers.anthropicApiKey | default "" | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.providers.openaiApiKey | default "" | quote }}
  GOOGLE_API_KEY: {{ .Values.secrets.providers.googleApiKey | default "" | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.providers.azureOpenaiApiKey | default "" | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.providers.awsAccessKeyId | default "" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.providers.awsSecretAccessKey | default "" | quote }}
  GCP_VERTEX_PROJECT_ID: {{ .Values.secrets.providers.gcpVertexProjectId | default "" | quote }}
{{- end -}}

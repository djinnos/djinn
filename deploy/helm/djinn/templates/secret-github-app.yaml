{{- if not .Values.secrets.githubApp.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "djinn.secretName.githubApp" . }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
type: Opaque
stringData:
  app-id: {{ .Values.secrets.githubApp.appId | default "" | quote }}
  client-id: {{ .Values.secrets.githubApp.clientId | default "" | quote }}
  client-secret: {{ .Values.secrets.githubApp.clientSecret | default "" | quote }}
  # The private key is PEM; preserve newlines. `toYaml` on a string emits a
  # quoted/literal scalar depending on contents — safer than manual indent.
  private-key.pem: {{ .Values.secrets.githubApp.privateKey | default "" | toYaml }}
  # Org binding — populated only when the operator sets a value. Empty keys
  # are skipped so the corresponding `optional: true` env vars on the server
  # container resolve to "unset" rather than "set-to-empty-string", matching
  # the semantics OrgBinding::load_from_env expects.
  {{- with .Values.secrets.githubApp.orgLogin }}
  org-login: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubApp.installationId }}
  installation-id: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubApp.orgId }}
  org-id: {{ . | quote }}
  {{- end }}
{{- end -}}

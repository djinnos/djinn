apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "djinn.fullname" . }}-controller
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.server.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "djinn.serviceAccountName.controller" . }}
    namespace: {{ include "djinn.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "djinn.fullname" . }}-controller

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "djinn.serviceAccountName.taskrun" . }}
  namespace: {{ include "djinn.namespace" . }}
  labels:
    {{- include "djinn.labels" . | nindent 4 }}
    app.kubernetes.io/component: taskrun
# This SA is mounted into task-run Job Pods. It has no RBAC of its own — Pods
# authenticate back to djinn-server via a projected token with audience
# `djinn`, which djinn-server validates with the TokenReview API.

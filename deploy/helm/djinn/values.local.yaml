# Overrides for kind / single-node local-dev clusters.
#
# Usage:
#   helm install djinn deploy/helm/djinn \
#     --values deploy/helm/djinn/values.local.yaml \
#     --namespace djinn --create-namespace
#
# Assumptions: images have been built locally and pushed to the in-cluster
# registry at localhost:5001 via `make image-push-local`. The kind node's
# containerd is wired (via scripts/kind/setup-kind.sh) to resolve
# `localhost:5001/...` through the registry container, so IfNotPresent is
# safe — the node pulls once and keeps the layer cached.

image:
  server: localhost:5001/djinn-server:dev
  runtime: localhost:5001/djinn-agent-runtime:dev
  pullPolicy: IfNotPresent

# Kind is single-node so RWX is irrelevant — hostPath volumes are the most
# predictable thing to use here. Templates fall back to hostPath when .hostPath
# is non-empty on either storage.mirrors or storage.cache.
storage:
  mirrors:
    hostPath: /var/lib/djinn/mirrors
    accessMode: ReadWriteOnce
  cache:
    hostPath: /var/lib/djinn/cache
    accessMode: ReadWriteOnce
  projects:
    hostPath: /var/lib/djinn/projects
    accessMode: ReadWriteOnce

ingress:
  enabled: false

# GitHub App credentials are plumbed in by the Tiltfile from .tilt/github-app/
# via `helm --set-file` — see the Tiltfile's "GitHub App credentials" block.
# Leave `secrets.githubApp` alone here so the chart's default path (render a
# Secret from values) stays active; the Tiltfile overrides the fields when
# the local files exist.

# Tighter resource defaults so the whole stack fits on a laptop.
# Server limit accounts for the in-process nomic-embed model (~500MB) +
# Dolt pool + OTEL + actors — 1Gi was OOMing on idle load.
resources:
  server:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  taskrun:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# Dolt's chunk store memory-maps aggressively and runs inline GC on COMMIT.
# 2Gi caused 60-130s COMMIT stalls under ordinary stack-update traffic.
dolt:
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "6Gi"
  storage:
    size: 5Gi
    accessMode: ReadWriteOnce

qdrant:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  storage:
    size: 2Gi
    accessMode: ReadWriteOnce

# Self-hosted Langfuse is deployed alongside djinn by the Tiltfile
# (deploy/langfuse-local/langfuse.yaml). The pk/sk here match the ones
# LANGFUSE_INIT_PROJECT_{PUBLIC,SECRET}_KEY seed on first Langfuse boot.
langfuse:
  enabled: true
  endpoint: "http://langfuse-web.djinn.svc.cluster.local:3000/api/public/otel"
  publicKey: "pk-lf-djinn-local-dev"
  secretKey: "sk-lf-djinn-local-dev-secret"

# Kind's default CSI driver is `standard` (rancher.io/local-path). Pin the
# Zot PVC to it so `kind` clusters bind without hunting for the cluster
# default, and drop the size way down so the whole stack fits on a laptop.
imagePipeline:
  zot:
    storage:
      storageClassName: standard
      size: 5Gi

env:
  rustLog: "info,djinn=debug"
  # Browser-side OAuth callback URL. For kind + `kubectl port-forward`, the
  # browser reaches the server at http://localhost:3000 — NOT the cluster-
  # internal Service DNS the configmap default would compute. Match this
  # value against your GitHub App's "Callback URL" setting at
  # https://github.com/settings/apps/<your-app>/edit (the path is
  # `/auth/github/callback`).
  publicUrl: "http://localhost:3000"
  # The SPA is served by the Vite dev server on :1420, separate from the
  # API on :3000. `DJINN_WEB_URL` is what the server 302s to after OAuth
  # succeeds — without this, login lands on http://localhost:3000/ which
  # has no SPA bundle. Production builds that serve the SPA from the API
  # pod would leave this empty.
  webUrl: "http://localhost:1420"

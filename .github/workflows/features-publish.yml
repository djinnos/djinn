name: Dev Container Features (build, lint, publish)

on:
  push:
    branches:
      - main
      - wip/multiuser-refactor-snapshot
    tags:
      - "feature-v*"
    paths:
      - "devcontainer-features/**"
      - "server/crates/djinn-agent-worker/**"
      - ".github/workflows/features-publish.yml"
      - "scripts/verify-feature-versions.sh"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish Features to GHCR"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write

env:
  WORKER_TARGET: x86_64-unknown-linux-musl

jobs:
  build-worker:
    name: Build djinn-agent-worker (musl)
    runs-on: ubuntu-24.04
    outputs:
      artifact-name: djinn-agent-worker-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl target + build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
              musl-tools pkg-config
          rustup target add ${{ env.WORKER_TARGET }}

      - name: Cargo build
        working-directory: server
        env:
          SQLX_OFFLINE: "true"
          # server/.cargo/config.toml hardcodes `rustc-wrapper = "sccache"`
          # for local dev speed. sccache isn't installed on the GitHub
          # runner; unset the wrapper inline so cargo doesn't try to spawn
          # a nonexistent binary.
          RUSTC_WRAPPER: ""
          CARGO_BUILD_RUSTC_WRAPPER: ""
        run: |
          cargo build --release \
              --target ${{ env.WORKER_TARGET }} \
              -p djinn-agent-worker

      - name: Stage binary
        run: |
          mkdir -p stage
          cp server/target/${{ env.WORKER_TARGET }}/release/djinn-agent-worker stage/
          strip stage/djinn-agent-worker || true
          file stage/djinn-agent-worker

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: djinn-agent-worker-${{ github.sha }}
          path: stage/djinn-agent-worker
          retention-days: 7

  lint-features:
    name: Lint Feature JSON + shell
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq + shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends jq shellcheck

      - name: JSON-lint devcontainer-feature.json files
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
              echo "validating $f"
              if ! jq empty "$f"; then
                  echo "::error file=$f::invalid JSON"
                  fail=1
                  continue
              fi
              for key in id version name; do
                  if [[ "$(jq -r ".$key // empty" "$f")" == "" ]]; then
                      echo "::error file=$f::missing required key: $key"
                      fail=1
                  fi
              done
          done < <(find devcontainer-features/src -name devcontainer-feature.json -print0)
          exit "$fail"

      - name: Validate scenarios.json
        run: |
          jq empty devcontainer-features/test/_global/scenarios.json

      - name: shellcheck install.sh + test.sh
        run: |
          # SC1091: we intentionally `source` runtime-only files (the
          # dev-container-features-test-lib path only exists inside the
          # devcontainer, not in the repo) — no way to resolve statically.
          # SC2016: test.sh wraps assertions in `bash -c '...'`; the
          # single-quoting is intentional so the inner bash expands `$PATH`
          # etc. at test time, not at `check` invocation time.
          shellcheck -e SC1091,SC2016 \
              devcontainer-features/src/*/install.sh \
              devcontainer-features/test/*/test.sh \
              scripts/verify-feature-versions.sh

  verify-versions:
    name: Verify upstream version drift (soft)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends jq

      - name: Run verifier
        run: bash scripts/verify-feature-versions.sh

  features-test:
    name: Run devcontainer features test
    runs-on: ubuntu-24.04
    needs: [build-worker, lint-features]
    # Only run on tag or workflow_dispatch to keep PR CI fast. The test pulls
    # full base images per-Feature (~10 min total).
    if: startsWith(github.ref, 'refs/tags/feature-v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download worker binary
        uses: actions/download-artifact@v4
        with:
          name: djinn-agent-worker-${{ github.sha }}
          path: devcontainer-features/src/djinn-agent-worker/bin

      - name: Make worker binary executable
        run: chmod +x devcontainer-features/src/djinn-agent-worker/bin/djinn-agent-worker

      - name: Install devcontainers CLI
        run: npm install -g @devcontainers/cli

      - name: Run features test matrix
        run: |
          devcontainer features test \
              --project-folder devcontainer-features \
              --skip-autogenerated

  publish:
    name: Publish Features to GHCR
    runs-on: ubuntu-24.04
    needs: [build-worker, lint-features]
    # Only publish on a feature-v* tag. PR / branch pushes just build+lint.
    if: startsWith(github.ref, 'refs/tags/feature-v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download worker binary
        uses: actions/download-artifact@v4
        with:
          name: djinn-agent-worker-${{ github.sha }}
          path: devcontainer-features/src/djinn-agent-worker/bin

      - name: Make worker binary executable
        run: chmod +x devcontainer-features/src/djinn-agent-worker/bin/djinn-agent-worker

      - name: Install @devcontainers/cli
        run: npm install -g @devcontainers/cli

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish Features to GHCR
        # `devcontainer features publish` always ends with a
        # collection-metadata upload that posts to
        # `/v2/djinnos/blobs/uploads/` (namespace only, no repo name) —
        # which GHCR rejects with NAME_INVALID, since OCI repos must be
        # `namespace/repo` shape. That's the final step of the CLI; all
        # individual Feature publishes (9 of them) complete successfully
        # first. This script parses the CLI log, counts `Published
        # feature:` lines, and only exits non-zero if a Feature actually
        # failed to publish — treating the collection-metadata failure
        # as cosmetic. Surfaced as an annotation so we don't forget it.
        run: |
          set -o pipefail
          expected=$(find devcontainer-features/src -mindepth 2 -maxdepth 2 \
                         -name devcontainer-feature.json | wc -l)
          devcontainer features publish \
              -r ghcr.io -n djinnos \
              ./devcontainer-features/src 2>&1 | tee publish.log || true
          published=$(grep -c 'Published feature: ' publish.log || true)
          echo "published=$published expected=$expected"
          if [ "$published" -ne "$expected" ]; then
              echo "::error::only $published/$expected Features published"
              exit 1
          fi
          if grep -q 'Failed to publish collection metadata' publish.log; then
              echo "::warning::collection metadata upload failed (known GHCR NAME_INVALID interop issue — cosmetic; all $expected Features published)"
          fi

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/feature-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
              --title "$tag" \
              --notes "Published Djinn Dev Container Features from \`${tag}\`." \
              || echo "release already exists"

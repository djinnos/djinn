name: Release Desktop

on:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, platform: linux }
          - { runner: macos-15, platform: macos }
          - { runner: windows-latest, platform: windows }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ui
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Patch version into package.json
        shell: bash
        run: |
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Build Electron app
        run: pnpm electron:build
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            ui/release/**/*.AppImage
            ui/release/**/*.deb
            ui/release/**/*.dmg
            ui/release/**/*.exe
            ui/release/**/*.msi
            ui/release/**/*.zip
            ui/release/**/*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f -exec mv {} flat/ \;
      - name: Create checksums
        working-directory: flat
        run: sha256sum * > checksums-desktop.txt
      - name: Publish release
        run: gh release create "${{ github.ref_name }}" flat/* --generate-notes --title "Desktop ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

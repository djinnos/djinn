name: Build DjinnOS Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-sidecar:
    name: Build sidecar (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: aarch64-apple-darwin
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: x86_64-apple-darwin
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: x86_64-pc-windows-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout server repository
        uses: actions/checkout@v4
        with:
          repository: djinnos/server
          path: server

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure Rust cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: sidecar-${{ matrix.platform }}
          workspaces: server

      - name: Build sidecar binary (Unix)
        if: matrix.platform != 'x86_64-pc-windows-msvc'
        run: |
          cd server
          cargo build --release --target ${{ matrix.target }}
          mkdir -p ../binaries
          cp target/${{ matrix.target }}/release/djinn-server ../binaries/djinn-server-${{ matrix.platform }}

      - name: Build sidecar binary (Windows)
        if: matrix.platform == 'x86_64-pc-windows-msvc'
        run: |
          cd server
          cargo build --release --target ${{ matrix.target }}
          mkdir -p ../binaries
          cp target/${{ matrix.target }}/release/djinn-server.exe ../binaries/djinn-server-${{ matrix.platform }}.exe

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.platform }}
          path: binaries/*
          retention-days: 1

  build-tauri:
    name: Build Tauri app
    needs: build-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: aarch64-apple-darwin
            os: macos-latest
            args: --target aarch64-apple-darwin
          - platform: x86_64-apple-darwin
            os: macos-latest
            args: --target x86_64-apple-darwin
          - platform: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            args: ""
          - platform: x86_64-pc-windows-msvc
            os: windows-latest
            args: ""

    steps:
      - name: Checkout desktop repository
        uses: actions/checkout@v4

      - name: Download sidecar artifacts
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.platform }}
          path: src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.platform }}

      - name: Configure Rust cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: tauri-${{ matrix.platform }}
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          projectPath: ./src-tauri

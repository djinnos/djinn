name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            desktop:
              - 'desktop/**'

  server:
    name: Server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Test"

      - name: Tests
        run: cargo test --all-targets --all-features

  desktop-frontend:
    name: Desktop Frontend
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Tests
        run: pnpm test

  desktop-tauri:
    name: Desktop Tauri
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: desktop/src-tauri

      - uses: rui314/setup-mold@v1

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev
          version: 1.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all-targets

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [server, desktop-frontend, desktop-tauri]
    steps:
      - name: Check results
        run: |
          results=("${{ needs.server.result }}" "${{ needs.desktop-frontend.result }}" "${{ needs.desktop-tauri.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Quality gate failed: found result '$r'"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"

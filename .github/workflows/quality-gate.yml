name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Shared environment for all jobs.
# RUSTC_WRAPPER is cleared to disable local sccache in CI; the
# Swatinem/rust-cache action handles caching instead.
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_BUILD_DIR: target
  RUSTC_WRAPPER: ""

jobs:
  # ── Change detection ────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/Cargo.toml'
              - 'server/Cargo.lock'
              - 'server/rust-toolchain.toml'
              - 'server/.cargo/**'
              - 'server/.config/**'
              - 'server/crates/**/Cargo.toml'
              - 'server/crates/**/*.rs'
              - 'server/src/**/*.rs'
              - '.github/workflows/quality-gate.yml'
            desktop:
              - 'desktop/**'

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Cache Warming (main push only)                                 ║
  # ║                                                                  ║
  # ║  These jobs build the workspace to pre-populate GitHub Actions   ║
  # ║  cache after every merge to main.  PR jobs set save-if: false    ║
  # ║  so they never write cache — guaranteeing consistent warm hits   ║
  # ║  from the last main commit.                                      ║
  # ╚══════════════════════════════════════════════════════════════════╝

  warm-cache-quality:
    name: Warm Cache (Quality)
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-quality
          cache-on-failure: true
          cache-all-crates: true

      - name: Build workspace (populate cache)
        run: cargo check --workspace --all-targets --all-features

      - name: Prune old caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --repo ${{ github.repository }} --key server-quality- \
            --sort created_at --order asc --json id | \
            jq -r '.[:-1].[].id' | \
            xargs -r -I{} gh cache delete {} --repo ${{ github.repository }} 2>/dev/null || true

  warm-cache-test:
    name: Warm Cache (Test)
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-test
          cache-on-failure: true
          cache-all-crates: true

      - uses: taiki-e/install-action@nextest

      - name: Build test binaries (populate cache)
        run: cargo nextest run --workspace --all-targets --all-features --no-run

      - name: Prune old caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --repo ${{ github.repository }} --key server-test- \
            --sort created_at --order asc --json id | \
            jq -r '.[:-1].[].id' | \
            xargs -r -I{} gh cache delete {} --repo ${{ github.repository }} 2>/dev/null || true

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Server Quality & Tests                                          ║
  # ║                                                                  ║
  # ║  These jobs read warm cache (save-if: false) and run the actual  ║
  # ║  quality gates.  On main pushes the warm-cache jobs above write  ║
  # ║  the cache; on PRs these jobs consume it.                        ║
  # ╚══════════════════════════════════════════════════════════════════╝

  server-clippy:
    name: Server Clippy
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-quality
          cache-on-failure: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Verify workspace-hack (hakari)
        run: |
          cargo install cargo-hakari --locked 2>/dev/null || true
          cargo hakari verify || {
            echo "::error::workspace-hack is out of date. Run 'cargo hakari generate && cargo hakari manage-deps' locally."
            exit 1
          }

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  server-test:
    name: Server Test
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-test
          cache-on-failure: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@nextest

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Test"

      - name: Tests
        run: cargo nextest run --workspace --all-targets --all-features --profile ci

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Desktop                                                         ║
  # ╚══════════════════════════════════════════════════════════════════╝

  desktop-frontend:
    name: Desktop Frontend
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Tests
        run: pnpm test

  desktop-tauri:
    name: Desktop Tauri
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    env:
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: desktop/src-tauri

      - uses: rui314/setup-mold@v1

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev
          version: 1.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          shared-key: desktop-tauri
          cache-on-failure: true

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all-targets

  # ── Quality gate ────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - warm-cache-quality
      - warm-cache-test
      - server-clippy
      - server-test
      - desktop-frontend
      - desktop-tauri
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.warm-cache-quality.result }}"
            "${{ needs.warm-cache-test.result }}"
            "${{ needs.server-clippy.result }}"
            "${{ needs.server-test.result }}"
            "${{ needs.desktop-frontend.result }}"
            "${{ needs.desktop-tauri.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Quality gate failed: found result '$r'"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Shared environment for all jobs.
# RUSTC_WRAPPER is cleared to disable local sccache in CI; the
# Swatinem/rust-cache action handles caching instead.
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_BUILD_DIR: target
  RUSTC_WRAPPER: ""

jobs:
  # ── Change detection ────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/Cargo.toml'
              - 'server/Cargo.lock'
              - 'server/rust-toolchain.toml'
              - 'server/.cargo/**'
              - 'server/.config/**'
              - 'server/crates/**/Cargo.toml'
              - 'server/crates/**/*.rs'
              - 'server/src/**/*.rs'
              - '.github/workflows/quality-gate.yml'
            desktop:
              - 'desktop/**'

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Cache Warming (main push only)                                 ║
  # ║                                                                  ║
  # ║  These jobs build the workspace to pre-populate GitHub Actions   ║
  # ║  cache after every merge to main.  PR jobs set save-if: false    ║
  # ║  so they never write cache — guaranteeing consistent warm hits   ║
  # ║  from the last main commit.                                      ║
  # ╚══════════════════════════════════════════════════════════════════╝

  warm-cache-quality:
    name: Warm Cache (Quality)
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-quality
          cache-on-failure: true
          cache-all-crates: true

      - name: Build workspace (populate cache)
        run: cargo check --workspace --all-targets --all-features

      - name: Prune old caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --repo ${{ github.repository }} --key server-quality- \
            --sort created_at --order asc --json id | \
            jq -r '.[:-1].[].id' | \
            xargs -r -I{} gh cache delete {} --repo ${{ github.repository }} 2>/dev/null || true

  warm-cache-test:
    name: Warm Cache (Test)
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-test
          cache-on-failure: true
          cache-all-crates: true

      - uses: taiki-e/install-action@nextest

      - name: Build test binaries (populate cache)
        run: cargo nextest run --workspace --all-targets --all-features --no-run

      - name: Prune old caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --repo ${{ github.repository }} --key server-test- \
            --sort created_at --order asc --json id | \
            jq -r '.[:-1].[].id' | \
            xargs -r -I{} gh cache delete {} --repo ${{ github.repository }} 2>/dev/null || true

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Server Quality & Tests                                          ║
  # ║                                                                  ║
  # ║  These jobs read warm cache (save-if: false) and run the actual  ║
  # ║  quality gates.  On main pushes the warm-cache jobs above write  ║
  # ║  the cache; on PRs these jobs consume it.                        ║
  # ╚══════════════════════════════════════════════════════════════════╝

  server-clippy:
    name: Server Clippy
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-quality
          cache-on-failure: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Verify workspace-hack (hakari)
        run: |
          cargo install cargo-hakari --locked 2>/dev/null || true
          cargo hakari verify || {
            echo "::error::workspace-hack is out of date. Run 'cargo hakari generate && cargo hakari manage-deps' locally."
            exit 1
          }

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  server-test:
    name: Server Test
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
    # Ephemeral Dolt for djinn-db integration tests. The workspace
    # `.cargo/config.toml` points DATABASE_URL and DJINN_TEST_MYSQL_URL
    # at :3307, matching the `dolt-test` service in docker-compose.yml —
    # CI inherits those values automatically, so we just need the port
    # forwarded here.
    services:
      dolt:
        image: dolthub/dolt-sql-server:latest
        env:
          DOLT_ROOT_PASSWORD: ""
          DOLT_ROOT_HOST: "%"
          DOLT_DATABASE: djinn
        ports:
          - 3307:3306
    steps:
      - uses: actions/checkout@v4

      - run: rustup toolchain install
        working-directory: server

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: server-test
          cache-on-failure: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@nextest

      # Prebuilt binary — avoids a multi-minute Rust build of sqlx-cli.
      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Wait for Dolt
        run: |
          # Dolt ships no health check, so poll. Check both: port open
          # (tcp) AND query-ready (SELECT 1). The latter covers the gap
          # between bind and accept — on cold start Dolt binds fast but
          # takes a few seconds to serve queries.
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/3307) >/dev/null 2>&1 \
               && mysql -h 127.0.0.1 -P 3307 -u root -e "SELECT 1" >/dev/null 2>&1; then
              echo "Dolt is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Dolt did not become ready within 60s"
          docker ps -a
          docker logs "$(docker ps -aqf 'ancestor=dolthub/dolt-sql-server:latest')" || true
          exit 1

      - name: Apply djinn-db migrations
        working-directory: server/crates/djinn-db
        env:
          DATABASE_URL: mysql://root@127.0.0.1:3307/djinn
        run: sqlx migrate run --source migrations_mysql

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Test"

      - name: Tests
        run: cargo nextest run --workspace --all-targets --all-features --profile ci

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Desktop                                                         ║
  # ╚══════════════════════════════════════════════════════════════════╝

  desktop-frontend:
    name: Desktop Frontend
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Tests
        run: pnpm test

  # ── Quality gate ────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - warm-cache-quality
      - warm-cache-test
      - server-clippy
      - server-test
      - desktop-frontend
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.warm-cache-quality.result }}"
            "${{ needs.warm-cache-test.result }}"
            "${{ needs.server-clippy.result }}"
            "${{ needs.server-test.result }}"
            "${{ needs.desktop-frontend.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Quality gate failed: found result '$r'"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"

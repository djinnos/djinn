name: Release Server

on:
  push:
    tags: ['server-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu, asset: djinn-server-linux-x64 }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, asset: djinn-server-linux-arm64 }
          - { runner: macos-13, target: x86_64-apple-darwin, asset: djinn-server-macos-x64 }
          - { runner: macos-15, target: aarch64-apple-darwin, asset: djinn-server-macos-arm64 }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show  # reads rust-toolchain.toml
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: release-server-${{ matrix.target }}
      - name: Build
        run: cargo build --release --features vendored --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/djinn-server ../${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        working-directory: artifacts
        run: sha256sum djinn-server-* > checksums-server.txt
      - name: Publish release
        run: gh release create "${{ github.ref_name }}" artifacts/* --generate-notes --title "Server ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release Server

on:
  push:
    tags: ['server-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, asset: djinn-server-linux-x64 }
          - { runner: macos-latest, asset: djinn-server-macos-arm64 }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: server
    env:
      RUSTC_WRAPPER: ""
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: release-server-${{ matrix.asset }}
      - name: Build
        run: cargo +stable build --release --features vendored
      - name: Rename binary
        run: cp target/release/djinn-server ../${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        working-directory: artifacts
        run: sha256sum djinn-server-* > checksums-server.txt
      - name: Publish release
        run: gh release create "${{ github.ref_name }}" artifacts/* --generate-notes --title "Server ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Optional Langfuse v3 observability layer for the djinn stack.
#
# Source: derived from server/docker/docker-compose.langfuse.yml. Keep them
# in sync when upgrading Langfuse; the standalone file is retained for devs
# who only want observability without the full djinn stack.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#
# Langfuse dashboard: http://localhost:5000
# OTLP endpoint:      http://localhost:5000/api/public/otel/v1/traces
#
# First run: sign up at http://localhost:5000, grab API keys from Settings >
# API Keys, then:
#   settings_set langfuse_public_key="pk-lf-..." langfuse_secret_key="sk-lf-..."

services:
  langfuse-web:
    image: langfuse/langfuse:3
    profiles: ["observability"]
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:5000
      NEXTAUTH_SECRET: djinn-local-dev-nextauth-secret-CHANGEME
      SALT: djinn-local-dev-salt-CHANGEME
      ENCRYPTION_KEY: 60f637c6ac9d2a532f9c8c8ee286617cb7090dcf92d88eebe857119e67dbc2a0
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      DATABASE_URL: postgresql://langfuse:langfuse-dev-CHANGEME@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse-dev-CHANGEME
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: redis-dev-CHANGEME
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minio-dev-CHANGEME
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: minio-dev-CHANGEME
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: ["observability"]
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      NODE_ENV: production
      NEXTAUTH_SECRET: djinn-local-dev-nextauth-secret-CHANGEME
      SALT: djinn-local-dev-salt-CHANGEME
      ENCRYPTION_KEY: 60f637c6ac9d2a532f9c8c8ee286617cb7090dcf92d88eebe857119e67dbc2a0
      DATABASE_URL: postgresql://langfuse:langfuse-dev-CHANGEME@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse-dev-CHANGEME
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: redis-dev-CHANGEME
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minio-dev-CHANGEME
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: minio-dev-CHANGEME
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    restart: unless-stopped

  langfuse-postgres:
    image: postgres:16-alpine
    profiles: ["observability"]
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse-dev-CHANGEME
    volumes:
      - langfuse_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24
    profiles: ["observability"]
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse-dev-CHANGEME
    volumes:
      - langfuse_clickhouse:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-minio:
    image: minio/minio:latest
    profiles: ["observability"]
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse /data/langfuse-media && minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio-dev-CHANGEME
    ports:
      - "127.0.0.1:9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - langfuse_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-redis:
    image: redis:7-alpine
    profiles: ["observability"]
    command: redis-server --requirepass redis-dev-CHANGEME
    volumes:
      - langfuse_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis-dev-CHANGEME", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  langfuse_postgres:
  langfuse_clickhouse:
  langfuse_clickhouse_logs:
  langfuse_minio:
  langfuse_redis:

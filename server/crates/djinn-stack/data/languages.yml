# Reduced subset vendored from github-linguist
# https://github.com/github-linguist/linguist/blob/main/lib/linguist/languages.yml
#
# Copyright (c) 2017 GitHub, Inc. - MIT license.
# See https://github.com/github-linguist/linguist/blob/main/LICENSE
#
# This subset covers ~40 of the most commonly observed languages in the
# Djinn corpus. Only fields djinn-stack consumes are kept: `type`,
# `extensions`, `filenames`. Full Linguist data (tm_scope, color, alias
# tables, interpreter lookups) is intentionally omitted.

Rust:
  type: programming
  extensions:
  - ".rs"
  - ".rs.in"

TypeScript:
  type: programming
  extensions:
  - ".ts"
  - ".cts"
  - ".mts"

TSX:
  type: programming
  extensions:
  - ".tsx"

JavaScript:
  type: programming
  extensions:
  - ".js"
  - ".cjs"
  - ".mjs"
  - ".jsx"
  - ".es6"

Python:
  type: programming
  extensions:
  - ".py"
  - ".pyi"
  - ".pyw"

Go:
  type: programming
  extensions:
  - ".go"

Ruby:
  type: programming
  extensions:
  - ".rb"
  filenames:
  - "Gemfile"
  - "Rakefile"

Java:
  type: programming
  extensions:
  - ".java"

Kotlin:
  type: programming

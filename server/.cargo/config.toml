[build]
rustc-wrapper = "sccache"
# NOTE: do NOT hardcode `target-dir` here. Per-worktree target directories
# are injected via the `CARGO_TARGET_DIR` env var by djinn-agent's command
# runner (see server/crates/djinn-agent/src/commands.rs). Committing a
# literal `target-dir` here contaminates main whenever a worker worktree
# picks it up — see fix/worktree-target-dir-isolation for history.

# Use mold for faster linking
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[profile.dev]
incremental = false          # required for sccache effectiveness

[profile.test]
incremental = false

# Release profile keeps default LLVM backend for optimized output
[profile.release]
incremental = false

[net]
git-fetch-with-cli = true

# Rewrite SSH GitHub URLs to HTTPS for CI / machines without SSH keys.
[url."https://github.com/jh-block/"]
insteadOf = "git@github.com:jh-block/"

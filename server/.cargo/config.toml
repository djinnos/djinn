[build]
rustc-wrapper = "sccache"

# Use mold for faster linking
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[profile.dev]
incremental = false          # required for sccache effectiveness

[profile.test]
incremental = false

# Release profile keeps default LLVM backend for optimized output
[profile.release]
incremental = false

[net]
git-fetch-with-cli = true

# Rewrite SSH GitHub URLs to HTTPS for CI / machines without SSH keys.
[url."https://github.com/jh-block/"]
insteadOf = "git@github.com:jh-block/"

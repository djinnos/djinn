appId: com.djinnos.desktop
productName: Djinn
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"
asar: true
linux:
  target:
    - AppImage
    - deb
  category: Development
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  target:
    - nsis
    - msi
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish: null

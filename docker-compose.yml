# Test-only Dolt instance for `cargo test` and sqlx macro compilation.
#
# The full dev stack (djinn-server, dev Dolt at :3306, Qdrant) runs inside
# the kind cluster managed by `tilt up` — see the Tiltfile at the repo
# root. The one thing Tilt does NOT run is this isolated test DB, because
# `cargo test` spins up ~250 ephemeral `djinn_test_*` DBs per crate and
# must stay off the shared dev DB.
#
# Consumed by Makefile targets: `test-db-migrate`, `test-db-reset`,
# `test`, `test-all`, `sqlx-prepare`, `sqlx-check`. The workspace
# `.cargo/config.toml` defaults DATABASE_URL to `:3307` so every cargo
# invocation in the repo hits this instance by default.

services:
  dolt-test:
    image: dolthub/dolt-sql-server:latest
    container_name: djinn-dolt-test
    restart: unless-stopped
    environment:
      DOLT_ROOT_PASSWORD: ""
      DOLT_ROOT_HOST: "%"
      DOLT_DATABASE: djinn
    ports:
      - "127.0.0.1:3307:3306"
    # Generous cap — `cargo test -p djinn-db` creates ~250 ephemeral
    # `djinn_test_*` DBs in a single run and each gets 4 migrations applied,
    # which spikes Dolt memory. At 2g Dolt was OOM-killed mid-run and every
    # downstream test saw "UnexpectedEof". 8g keeps the full suite stable.
    mem_limit: 8g
    memswap_limit: 8g

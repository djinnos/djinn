# Full djinn stack: server + dolt + qdrant.
#
# Usage:
#   docker compose up                                       # core stack
#   docker compose --profile observability up               # + langfuse
#
# Host paths:
#   ${DJINN_HOME:-~/.djinn}/        -> /root/.djinn         (logs, tokens, data)
#   ${DJINN_WORKSPACE_ROOT:-$HOME}  -> /workspace           (user codebases)
#
# Per-task-run sandbox surface (consumed by LocalDockerRuntime, NOT mounted
# into djinn-server itself):
#   ${DJINN_HOME:-~/.djinn}/mirrors       host-side mirror clones (ro in task)
#   ${DJINN_HOME:-~/.djinn}/cache/cargo   shared cargo cache       (rw)
#   ${DJINN_HOME:-~/.djinn}/cache/pnpm    shared pnpm store        (rw)
#   ${DJINN_HOME:-~/.djinn}/cache/pip     shared pip cache         (rw)
#   ${DJINN_HOME:-~/.djinn}/ipc           task-run IPC sockets     (rw)
# These are pre-created by the djinn-server entrypoint (see below) so the
# uid-10001 djinn user inside djinn-agent-runtime containers can write to
# them when LocalDockerRuntime bind-mounts them.

services:
  dolt:
    image: dolthub/dolt-sql-server:latest
    container_name: djinn-dolt
    restart: unless-stopped
    environment:
      DOLT_ROOT_PASSWORD: ""
      DOLT_ROOT_HOST: "%"
      DOLT_DATABASE: djinn
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ${DJINN_HOME:-${HOME}/.djinn}/dolt:/var/lib/dolt
    # Cap RAM so runaway query caches can't freeze the host. Dolt had
    # been claiming ~37GB with accumulated test-DB clutter before this.
    mem_limit: 8g
    memswap_limit: 8g

  # Isolated Dolt instance for `cargo test` and sqlx macro compilation.
  # No host volume — state is ephemeral, scoped to container lifetime.
  # The workspace `.cargo/config.toml` defaults DATABASE_URL here, so
  # `cargo test` / `cargo check` use this instance automatically. The
  # dev Dolt on :3306 is opt-in only — agents can't accidentally hit it.
  dolt-test:
    image: dolthub/dolt-sql-server:latest
    container_name: djinn-dolt-test
    restart: unless-stopped
    environment:
      DOLT_ROOT_PASSWORD: ""
      DOLT_ROOT_HOST: "%"
      DOLT_DATABASE: djinn
    ports:
      - "127.0.0.1:3307:3306"
    # Generous cap — `cargo test -p djinn-db` creates ~250 ephemeral
    # `djinn_test_*` DBs in a single run and each gets 4 migrations applied,
    # which spikes Dolt memory. At 2g Dolt was OOM-killed mid-run and every
    # downstream test saw "UnexpectedEof". 8g keeps the full suite stable
    # while still bounded (the dev Dolt on :3306 uses the same cap).
    mem_limit: 8g
    memswap_limit: 8g

  qdrant:
    image: qdrant/qdrant:latest
    container_name: djinn-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ${DJINN_HOME:-${HOME}/.djinn}/qdrant:/qdrant/storage

  djinn-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: djinn-server:local
    container_name: djinn-server
    restart: unless-stopped
    depends_on:
      dolt:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:8372:8372"
      # OAuth callback (Codex, Copilot). Browser redirects to localhost:1455
      # and docker forwards into the server container.
      - "127.0.0.1:1455:1455"
    environment:
      DJINN_DB_BACKEND: dolt
      DJINN_MYSQL_URL: mysql://root@dolt:3306/djinn
      DJINN_MYSQL_FLAVOR: dolt
      DJINN_VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6334
      RUST_LOG: ${RUST_LOG:-info}
      # URL where GitHub (and users' browsers) reach the API server. Must
      # match the callback URL registered on the GitHub App.
      DJINN_PUBLIC_URL: ${DJINN_PUBLIC_URL:-http://127.0.0.1:8372}
      # URL where the web client is served (Vite dev server in development).
      # Post-OAuth redirects land here. Defaults to DJINN_PUBLIC_URL.
      DJINN_WEB_URL: ${DJINN_WEB_URL:-http://127.0.0.1:1420}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
    volumes:
      - ${DJINN_HOME:-${HOME}/.djinn}:/root/.djinn
      - ${DJINN_WORKSPACE_ROOT:-${HOME}}:/workspace:rw
      # Docker socket so djinn-server (LocalDockerRuntime) can launch
      # djinn-agent-runtime sandboxes on the host's docker engine.
      - /var/run/docker.sock:/var/run/docker.sock
      # Per-task-run sandbox surface. These are ALSO bind-mounted by
      # LocalDockerRuntime into the djinn-agent-runtime container it
      # launches per task; mounting them into djinn-server here ensures
      # (a) the paths exist on the host under a single DJINN_HOME root,
      # and (b) djinn-server can stage mirror clones + read back reports
      # without extra indirection.
      - ${DJINN_HOME:-${HOME}/.djinn}/mirrors:/var/lib/djinn/mirrors
      - ${DJINN_HOME:-${HOME}/.djinn}/cache/cargo:/var/lib/djinn/cache/cargo
      - ${DJINN_HOME:-${HOME}/.djinn}/cache/pnpm:/var/lib/djinn/cache/pnpm
      - ${DJINN_HOME:-${HOME}/.djinn}/cache/pip:/var/lib/djinn/cache/pip
      - ${DJINN_HOME:-${HOME}/.djinn}/ipc:/var/run/djinn
